<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Webpage</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(
                135deg,
                red,
                orange,
                yellow,
                green,
                cyan,
                blue,
                violet
            );
            color: white;
            text-align: center;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.45);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 0px 25px rgba(0,0,0,0.4);
            width: 80%;
            max-width: 700px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        p {
            font-size: 22px;
            margin: 10px 0;
        }

        .ip-box {
            margin-top: 25px;
            padding: 15px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1> Welcome to the page </h1>

        <p>This webpage is hosted on an AWS EC2 Server.</p>
        <p>Created using Terraform + Apache + Userdata Script.</p>

        <div class="ip-box">
            Server IP: <span id="server-ip">Loading...</span>
        </div>
    </div>

    <script>
        document.getElementById("server-ip").innerText = window.location.hostname;
    </script>

</body>
</html>
